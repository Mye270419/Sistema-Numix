<div class="login-container" #loginContainer>

  <!-- Logo NUMIX -->
  <div class="numix-logo" #numixLogo>
    <h1 class="logo-text">NUMIX</h1>
    <p class="logo-subtitle">Sistema Contable Bolivia</p>
  </div>

  <!-- Formulario -->
  <div class="login-form" #loginForm>

    <!-- ── MODO LOGIN ── -->
    <ng-container *ngIf="!modoRegistro">
      <div class="form-header">
        <h2>Iniciar Sesión</h2>
        <p>Accede a tu sistema contable</p>
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label for="username">Email o Usuario</label>
          <input
            type="text"
            id="username"
            class="form-input"
            [(ngModel)]="username"
            name="username"
            placeholder="correo@empresa.com"
            required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            class="form-input"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          ⚠️ {{ errorMessage }}
        </div>

        <button type="submit" class="login-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Iniciar Sesión</span>
          <span *ngIf="isLoading" class="loading-text">
            <span class="spinner"></span> Iniciando...
          </span>
        </button>
      </form>

      <!-- Credenciales demo -->
      <div class="demo-credentials" *ngIf="showDemo">
        <p class="demo-title">🚀 Credenciales de Demo:</p>
        <div class="demo-buttons">
          <button type="button" class="demo-btn admin-btn" (click)="fillDemoCredentials('admin')">
            👑 Administrador
          </button>
          <button type="button" class="demo-btn contador-btn" (click)="fillDemoCredentials('contador')">
            📊 Contador
          </button>
        </div>
      </div>

      <div class="toggle-modo">
        <span>¿No tienes cuenta?</span>
        <button type="button" class="btn-link" (click)="toggleModo()">
          Registrar empresa
        </button>
      </div>
    </ng-container>

    <!-- ── MODO REGISTRO ── -->
    <ng-container *ngIf="modoRegistro">
      <div class="form-header">
        <h2>Registrar Empresa</h2>
        <p>Crea tu cuenta en NUMIX</p>
      </div>

      <form (ngSubmit)="onRegistro()">
        <div class="form-group">
          <label>Nombre de la Empresa *</label>
          <input type="text" class="form-input"
            [(ngModel)]="registroForm.nombreEmpresa" name="nombreEmpresa"
            placeholder="Ej: Constructora ABC S.R.L." required>
        </div>
        <div class="form-group">
          <label>NIT *</label>
          <input type="text" class="form-input"
            [(ngModel)]="registroForm.nit" name="nit"
            placeholder="123456789" required>
        </div>
        <div class="form-group">
          <label>Nombre Completo del Administrador *</label>
          <input type="text" class="form-input"
            [(ngModel)]="registroForm.nombreCompleto" name="nombreCompleto"
            placeholder="Juan Pérez Mamani" required>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" class="form-input"
            [(ngModel)]="registroForm.email" name="email"
            placeholder="admin@empresa.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña *</label>
          <input type="password" class="form-input"
            [(ngModel)]="registroForm.password" name="password"
            placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="form-group">
          <label>Confirmar Contraseña *</label>
          <input type="password" class="form-input"
            [(ngModel)]="registroForm.confirmarPassword" name="confirmarPassword"
            placeholder="Repite la contraseña" required>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          ⚠️ {{ errorMessage }}
        </div>

        <button type="submit" class="login-btn" [disabled]="isLoading">
          <span *ngIf="!isLoading">Crear Cuenta</span>
          <span *ngIf="isLoading" class="loading-text">
            <span class="spinner"></span> Registrando...
          </span>
        </button>
      </form>

      <div class="toggle-modo">
        <span>¿Ya tienes cuenta?</span>
        <button type="button" class="btn-link" (click)="toggleModo()">
          Iniciar sesión
        </button>
      </div>
    </ng-container>

  </div>
</div>
