
<div class="login-container" #loginContainer>
  <!-- Logo NUMIX -->
  <div class="numix-logo" #numixLogo>
    <h1 class="logo-text">NUMIX</h1>
    <p class="logo-subtitle">Sistema Contable Bolivia</p>
  </div>

  <!-- Formulario de Login -->
  <div class="login-form" #loginForm>
    <div class="form-header">
      <h2>Iniciar Sesión</h2>
      <p>Accede a tu sistema contable</p>
    </div>

    <form (ngSubmit)="onLogin()" #form="ngForm">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          type="text" 
          id="username"
          class="form-input"
          [(ngModel)]="username"
          name="username"
          placeholder="Ingrese su usuario"
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password"
          class="form-input"
          [(ngModel)]="password"
          name="password"
          placeholder="Ingrese su contraseña"
          required>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button 
        type="submit" 
        class="login-btn"
        [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading">Iniciando...</span>
      </button>
    </form>

    <!-- Credenciales de demo -->
    <div class="demo-credentials" *ngIf="showDemo">
      <p class="demo-title">🚀 Credenciales de Demo:</p>
      <div class="demo-buttons">
        <button 
          type="button" 
          class="demo-btn admin-btn"
          (click)="fillDemoCredentials('admin')">
          👑 Administrador
        </button>
        <button 
          type="button" 
          class="demo-btn contador-btn"
          (click)="fillDemoCredentials('contador')">
          📊 Contador
        </button>
      </div>
    </div>
  </div>
</div>
