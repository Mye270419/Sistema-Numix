<div class="splash-container" #splashContainer>

  <!-- Partículas de fondo -->
  <div class="particles-container" #particlesContainer></div>

  <!-- Logo NUMIX — las letras se renderizan via CSS ::before, no como texto -->
  <div class="numix-container" #numixContainer>
    <span class="numix-letter" data-letter="N"></span>
    <span class="numix-letter" data-letter="U"></span>
    <span class="numix-letter" data-letter="M"></span>
    <span class="numix-letter" data-letter="I"></span>
    <span class="numix-letter" data-letter="X"></span>

    <!-- Pulsos de energía -->
    <div class="energy-pulse" data-pulse="0"></div>
    <div class="energy-pulse" data-pulse="1"></div>
    <div class="energy-pulse" data-pulse="2"></div>
    <div class="energy-pulse" data-pulse="3"></div>
    <div class="energy-pulse" data-pulse="4"></div>
  </div>

  <!-- Subtítulo -->
  <div class="splash-subtitle">Sistema Contable Bolivia</div>

  <!-- Overlay de transición -->
  <div class="dashboard-transition" #dashboardTransition>
    <div class="transition-text">Bienvenido a NUMIX</div>
  </div>

</div>
