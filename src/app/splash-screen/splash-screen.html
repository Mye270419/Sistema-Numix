<div class="splash-container" #splashContainer>
  <!-- Contenedor de partículas -->
  <div class="particles-container" #particlesContainer></div>
  
  <!-- Logo NUMIX -->
  <div class="numix-container" #numixContainer>
    <span class="numix-letter" data-letter="N">N</span>
    <span class="numix-letter" data-letter="U">U</span>
    <span class="numix-letter" data-letter="M">M</span>
    <span class="numix-letter" data-letter="I">I</span>
    <span class="numix-letter" data-letter="X">X</span>
    
    <!-- Pulsos de energía -->
    <div class="energy-pulse" data-pulse="0"></div>
    <div class="energy-pulse" data-pulse="1"></div>
    <div class="energy-pulse" data-pulse="2"></div>
    <div class="energy-pulse" data-pulse="3"></div>
    <div class="energy-pulse" data-pulse="4"></div>
  </div>
  
  <!-- Transición -->
  <div class="dashboard-transition" #dashboardTransition>
    <div>Bienvenido al Sistema NUMIX</div>
  </div>

  <!-- Botón opcional -->
  <button 
    *ngIf="showStartButton" 
    class="start-button" 
    (click)="startAnimation()">
    Iniciar Experiencia NUMIX
  </button>
</div>
